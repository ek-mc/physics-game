<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1><button id="homeBtn" class="home-btn" title="Αρχική">🎯 Physics Game</button></h1>
    <p class="subtitle">Quiz φυσικής στα ελληνικά (ABCD) με παγίδες, επίπεδα και χρονόμετρο.</p>

    <section id="menu" class="card">
      <h2>Ρυθμίσεις</h2>
      <div class="settings">
        <label>Δυσκολία
          <select id="difficultySelect">
            <option value="mixed">Μικτή</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>

        <label>Πλήθος ερωτήσεων
          <select id="countSelect">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30" selected>30</option>
            <option value="40">40</option>
            <option value="60">60</option>
          </select>
        </label>

        <label class="toggle"><input type="checkbox" id="timerToggle" checked /> Timer mode</label>
        <label>Χρόνος/ερώτηση
          <select id="timerSecondsSelect">
            <option value="20">20s</option>
            <option value="30">30s</option>
            <option value="45" selected>45s</option>
            <option value="60">60s</option>
          </select>
        </label>
        <label class="toggle"><input type="checkbox" id="streakToggle" /> Streak mode (τέλος στο πρώτο λάθος)</label>
      </div>

      <h2>Επίλεξε ενότητα</h2>
      <div class="buttons">
        <button data-mode="chapter" data-chapter="kinematics">Κινηματική</button>
        <button data-mode="chapter" data-chapter="dynamics">Δυναμική</button>
        <button data-mode="chapter" data-chapter="rotation">Περιστροφή</button>
        <button data-mode="chapter" data-chapter="energy">Έργο & Ενέργεια</button>
        <button data-mode="random">Τυχαίο από όλα</button>
      </div>

      <p class="meta" id="bankInfo"></p>
      <p class="meta" id="bestInfo"></p>
    </section>

    <section id="quiz" class="card hidden">
      <div class="top-row">
        <span id="progress">Ερώτηση 1/10</span>
        <span id="score">Σκορ: 0</span>
      </div>
      <div class="top-row">
        <span id="streak">Streak: 0</span>
        <span id="timer">⏱ 20s</span>
      </div>
      <h3 id="question"></h3>
      <div id="graphBox" class="graph-box"></div>
      <div id="answers" class="answers"></div>
      <p id="feedback" class="feedback"></p>
      <div class="actions">
        <button id="nextBtn" disabled>Επόμενη</button>
        <button id="backBtn">Πίσω στο μενού</button>
      </div>
    </section>

    <section id="result" class="card hidden">
      <h2>Αποτελέσματα</h2>
      <p id="resultText"></p>
      <p id="bestResultText" class="meta"></p>
      <button id="restartBtn">Νέο Quiz</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
