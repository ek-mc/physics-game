<!doctype html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Physics Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>🎯 Physics Game</h1>
    <p class="subtitle">Μικρό quiz φυσικής με παγίδες (ABCD)</p>

    <section id="menu" class="card">
      <h2>Επίλεξε mode</h2>
      <div class="buttons">
        <button data-mode="chapter" data-chapter="kinematics">Κινηματική</button>
        <button data-mode="chapter" data-chapter="dynamics">Δυναμική</button>
        <button data-mode="chapter" data-chapter="rotation">Περιστροφή</button>
        <button data-mode="chapter" data-chapter="energy">Έργο & Ενέργεια</button>
        <button data-mode="random">10 Τυχαίες Ερωτήσεις</button>
      </div>
    </section>

    <section id="quiz" class="card hidden">
      <div class="top-row">
        <span id="progress">Ερώτηση 1/10</span>
        <span id="score">Σκορ: 0</span>
      </div>
      <h3 id="question"></h3>
      <div id="answers" class="answers"></div>
      <p id="feedback" class="feedback"></p>
      <div class="actions">
        <button id="nextBtn" disabled>Επόμενη</button>
        <button id="backBtn">Πίσω στο μενού</button>
      </div>
    </section>

    <section id="result" class="card hidden">
      <h2>Αποτελέσματα</h2>
      <p id="resultText"></p>
      <button id="restartBtn">Νέο Quiz</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
